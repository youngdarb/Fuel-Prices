<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Guernsey Fuel Prices</title>
<style>
  :root {
    --bg: #eef1ee;
    --card: #ffffff;
    --ink: #16201c;
    --muted: #5d6b64;
    --line: #d8ded9;
    --best: #1e8f5a;
    --best-bg: #e6f4ec;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--ink);
    font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    line-height: 1.4;
    padding: 24px 16px 64px;
  }
  .wrap { max-width: 760px; margin: 0 auto; }
  header { margin-bottom: 4px; }
  h1 {
    font-size: clamp(1.8rem, 6vw, 2.6rem);
    font-weight: 800;
    letter-spacing: -0.02em;
  }
  .sub { color: var(--muted); font-size: 0.95rem; margin-bottom: 24px; }
  .updated { font-weight: 600; color: var(--ink); }

  .grid { display: flex; flex-direction: column; gap: 10px; }
  .row {
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 14px;
    padding: 16px 18px;
    display: grid;
    grid-template-columns: 1fr auto auto;
    gap: 12px;
    align-items: center;
  }
  .station { min-width: 0; }
  .station .name { font-weight: 700; font-size: 1.05rem; }
  .station .parish { color: var(--muted); font-size: 0.85rem; }

  .price { text-align: right; }
  .price .label {
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--muted);
  }
  .price .val {
    font-variant-numeric: tabular-nums;
    font-weight: 700;
    font-size: 1.25rem;
  }
  .price.best .val { color: var(--best); }
  .price.best {
    background: var(--best-bg);
    border-radius: 10px;
    padding: 6px 10px;
    margin: -6px -4px;
  }
  .tag {
    display: inline-block;
    font-size: 0.62rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: var(--best);
  }
  .empty { color: var(--muted); padding: 24px; text-align: center; }
  footer { margin-top: 32px; color: var(--muted); font-size: 0.8rem; }
  @media (max-width: 480px) {
    .price .val { font-size: 1.1rem; }
    .row { padding: 14px; gap: 8px; }
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>Guernsey Fuel Prices</h1>
    <p class="sub">Pence per litre · updated <span class="updated" id="updated">—</span></p>
  </header>
  <div class="grid" id="grid"><p class="empty">Loading prices…</p></div>
  <footer>Cheapest price in each fuel type is highlighted. Prices are supplied manually and may not reflect the pump in real time.</footer>
</div>

<script>
async function load() {
  const grid = document.getElementById('grid');
  try {
    const res = await fetch('prices.json?' + Date.now()); // cache-bust so refresh shows latest
    const data = await res.json();
    document.getElementById('updated').textContent = data.updated || '—';

    const stations = data.stations.filter(s => s.unleaded > 0 || s.diesel > 0);
    if (!stations.length) {
      grid.innerHTML = '<p class="empty">No prices yet. Add them in prices.json.</p>';
      return;
    }

    const minUnleaded = Math.min(...stations.filter(s => s.unleaded > 0).map(s => s.unleaded));
    const minDiesel   = Math.min(...stations.filter(s => s.diesel   > 0).map(s => s.diesel));

    stations.sort((a, b) => (a.unleaded || 999) - (b.unleaded || 999));

    grid.innerHTML = stations.map(s => `
      <div class="row">
        <div class="station">
          <div class="name">${s.name}</div>
          <div class="parish">${s.parish || ''}</div>
        </div>
        ${col('Unleaded', s.unleaded, s.unleaded === minUnleaded)}
        ${col('Diesel', s.diesel, s.diesel === minDiesel)}
      </div>
    `).join('');
  } catch (e) {
    grid.innerHTML = '<p class="empty">Could not load prices. Check prices.json.</p>';
  }
}

function col(label, val, isBest) {
  if (!val || val <= 0) return `<div class="price"><div class="label">${label}</div><div class="val">—</div></div>`;
  return `<div class="price ${isBest ? 'best' : ''}">
    <div class="label">${label} ${isBest ? '<span class="tag">Best</span>' : ''}</div>
    <div class="val">${val.toFixed(1)}</div>
  </div>`;
}

load();
</script>
</body>
</html>
