<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Page Not Found — GSY Fuel Prices</title>
<meta name="robots" content="noindex">
<meta name="theme-color" content="#1a3a2a">
<link rel="icon" href="/favicon.ico" sizes="48x48">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
<style>
  :root { --bg: #f0f2f0; --ink: #16201c; --muted: #5d6b64; --line: #d8ded9; --green: #1a7a48; --header-bg: #1a3a2a; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--ink); font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 16px; }
  .box { background: #fff; border: 1px solid var(--line); border-radius: 14px; padding: 40px 36px; text-align: center; max-width: 420px; }
  .box .icon { font-size: 2.6rem; margin-bottom: 10px; }
  h1 { font-size: 1.4rem; font-weight: 800; margin-bottom: 8px; }
  p { font-size: 0.9rem; color: var(--muted); line-height: 1.6; margin-bottom: 20px; }
  a.btn { display: inline-block; background: var(--green); color: #fff; text-decoration: none; font-weight: 700; font-size: 0.9rem; border-radius: 10px; padding: 12px 24px; }
  a.btn:hover { background: #155e38; }
</style>
</head>
<body>
  <div class="box">
    <div class="icon">⛽</div>
    <h1>Page not found</h1>
    <p>That page doesn't exist. The live fuel prices are on the home page.</p>
    <a class="btn" href="/">View live prices</a>
  </div>
</body>
</html>
