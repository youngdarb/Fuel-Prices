name: iOS release (TestFlight/App Store)

# Manual trigger — run from the Actions tab when you want to ship a build.
# fastlane creates the distribution certificate and provisioning profile
# via the App Store Connect API key (no Mac or iPhone required), builds
# a signed IPA and uploads it to App Store Connect / TestFlight.
on:
  workflow_dispatch:
    inputs:
      lane:
        description: "fastlane lane (release or nuke)"
        default: "release"
        required: true

jobs:
  release:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4

      - name: Select newest Xcode
        run: |
          XCODE=$(ls -d /Applications/Xcode_26*.app 2>/dev/null | sort -V | tail -1)
          if [ -z "$XCODE" ]; then XCODE=$(ls -d /Applications/Xcode_*.app | sort -V | tail -1); fi
          echo "Using $XCODE"
          sudo xcode-select -s "$XCODE"
          xcodebuild -version

      - name: Install CocoaPods dependencies
        run: |
          cd ios
          pod install

      - name: Build and upload via fastlane
        env:
          APPSTORE_KEY_ID: ${{ secrets.APPSTORE_KEY_ID }}
          APPSTORE_ISSUER_ID: ${{ secrets.APPSTORE_ISSUER_ID }}
          APPSTORE_PRIVATE_KEY: ${{ secrets.APPSTORE_PRIVATE_KEY }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          MATCH_GIT_BASIC_AUTHORIZATION: ${{ secrets.MATCH_GIT_BASIC_AUTHORIZATION }}
        run: |
          cd ios
          fastlane ${{ inputs.lane }}
